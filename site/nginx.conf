# Crate landing page — nginx server block.
# Mounted at /etc/nginx/conf.d/default.conf so the stock image's gzip + mime
# defaults still apply. TLS is terminated at the Cloudflare edge; nginx only
# ever speaks plain HTTP to the cloudflared sidecar over the internal network.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-lived caching for the heavy, content-addressed-ish assets
    # (screenshots/gifs rarely change); short cache for the HTML itself.
    location ~* \.(png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Static site: serve the file, otherwise fall back to the landing page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Modest hardening for a public marketing page.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Don't advertise the version.
    server_tokens off;
}
