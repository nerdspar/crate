<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crate</title>
</head>
<body>
<div id="shelf-viewport">
  <div id="shelf"></div>
</div>
<div id="ledge"></div>

<!-- Control center: swipe down from the top edge (§6). The grip is a thin
     top-edge hotzone so the horizontal shelf gesture engine stays untouched. -->
<div id="cc-grip" aria-hidden="true"></div>
<div id="cc">
  <div id="cc-sheet">
    <div class="cc-handle" aria-label="Close"></div>
    <div class="cc-cols">
      <div class="cc-col-play">
        <div class="cc-np">
          <div class="cc-art" id="cc-art"></div>
          <div class="cc-np-meta">
            <div class="cc-title" id="cc-title">Nothing playing</div>
            <div class="cc-sub" id="cc-artist"></div>
            <div class="cc-seek" id="cc-seek"><div class="cc-seek-fill" id="cc-seek-fill"></div></div>
            <div class="cc-times"><span id="cc-cur">0:00</span><span id="cc-dur">0:00</span></div>
          </div>
        </div>
        <div class="cc-transport">
          <button id="cc-prev" aria-label="Previous">⏮</button>
          <button id="cc-playpause" aria-label="Play or pause">▶</button>
          <button id="cc-next" aria-label="Next">⏭</button>
        </div>
      </div>
      <div class="cc-col-rooms">
        <div class="cc-block-label">Rooms &amp; volume</div>
        <div id="cc-rooms"></div>
      </div>
    </div>
  </div>
</div>

<!-- Find bar: swipe up from the bottom edge. Slim and un-dimmed so the shelf
     stays visible and filters live as you type. Holds sort + Settings too. -->
<div id="find-grip" aria-hidden="true"></div>
<div id="find">
  <div id="find-bar">
    <div class="cc-handle" aria-label="Close"></div>
    <input id="find-search" type="search" placeholder="Search your shelf…" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="find-row">
      <div class="choices" id="sort-choices"></div>
      <button id="find-settings" class="cc-sysbtn">Settings</button>
    </div>
  </div>
</div>

<!-- Software brightness dim (used when no hardware backlight control exists) -->
<div id="dim"></div>
<!-- Display sleep: full black, tap anywhere to wake -->
<div id="sleep"></div>

<div id="settings">
  <button id="settings-close" class="room" style="position:absolute; top:4vh; right:4vw; z-index:2;">Done</button>
  <div id="settings-card">
    <div class="set-tabs">
      <button class="set-tab on" data-pane="shelf">Shelf</button>
      <button class="set-tab" data-pane="device">Device</button>
    </div>
    <div class="set-pane on" data-pane="shelf">
      <div class="setting-row">
        <div class="label">Spine art</div>
        <div class="choices" id="spine-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Spine thickness</div>
        <div class="choices" id="thickness-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Spine width</div>
        <div class="choices" id="width-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Spine text direction</div>
        <div class="choices" id="dir-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Label ink</div>
        <div class="choices" id="ink-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Album year</div>
        <div class="choices" id="year-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Year position</div>
        <div class="choices" id="yearpos-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Year emphasis</div>
        <div class="choices" id="yearemph-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Label layout</div>
        <div class="choices" id="layout-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Typography</div>
        <div class="choices" id="vary-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">Opening an album shows</div>
        <div class="choices" id="open-choices"></div>
      </div>
      <div class="setting-row">
        <div class="label">After playing</div>
        <div class="choices" id="afterplay-choices"></div>
      </div>
    </div>
    <div class="set-pane" data-pane="device">
      <div class="setting-row">
        <div class="label">Brightness</div>
        <input id="cc-brightness" type="range" min="8" max="100" value="100">
      </div>
      <div class="setting-row">
        <div class="label">Display &amp; system</div>
        <div class="cc-syscols">
          <div class="cc-syscol">
            <div class="cc-block-label">Display</div>
            <div class="cc-sys-actions">
              <button id="cc-sleep" class="cc-sysbtn">Sleep now</button>
            </div>
          </div>
          <div class="cc-syscol">
            <div class="cc-block-label">System</div>
            <div class="cc-sys-actions">
              <button id="cc-refresh" class="cc-sysbtn">Refresh art</button>
              <button id="cc-restart" class="cc-sysbtn">Restart app</button>
              <button id="cc-reboot" class="cc-sysbtn">Reboot</button>
            </div>
          </div>
          <div class="cc-syscol">
            <div class="cc-block-label">Status</div>
            <div class="cc-sysline"><span id="cc-ip">—</span><span class="cc-ver" id="cc-ver"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="set-tip"></div>

<div id="toast"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
