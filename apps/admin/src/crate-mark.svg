<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- solid wood body -->
  <rect x="8" y="28" width="84" height="46" rx="3.5" fill="#5c4632"/>
  <!-- dark interior opening: uniform 6-unit frame on all sides (x14..86, y34..68) -->
  <rect x="14" y="34" width="72" height="34" rx="1.5" fill="#241c14"/>

  <!-- CD spines, centered vertically (2.5 gap top and bottom); block y=36.5..65.5 -->
  <rect x="16"   y="36.5" width="5" height="29" rx="1" fill="#5a6fb5"/>
  <rect x="22.2" y="36.5" width="5" height="29" rx="1" fill="#b5543a"/>
  <rect x="28.4" y="36.5" width="5" height="29" rx="1" fill="#2f4f6f"/>
  <rect x="34.6" y="36.5" width="5" height="29" rx="1" fill="#caa03c"/>
  <rect x="40.8" y="36.5" width="5" height="29" rx="1" fill="#6b8f5a"/>
  <rect x="47"   y="36.5" width="5" height="29" rx="1" fill="#7a6a8f"/>
  <rect x="53.2" y="36.5" width="5" height="29" rx="1" fill="#4ea6a0"/>
  <rect x="59.4" y="36.5" width="5" height="29" rx="1" fill="#8a3a2e"/>
  <rect x="65.6" y="36.5" width="5" height="29" rx="1" fill="#9aa3ad"/>
  <!-- leaning CD: clears neighbor, bottom-right on baseline (65.5), top-right kisses inner wall (x86) -->
  <rect x="70.5" y="36.5" width="5" height="29" rx="1" fill="#ece7dd"
        transform="rotate(21.23 75.5 65.5)"/>

  <!-- single continuous inner groove: identical corners, sits mid-frame -->
  <rect x="11" y="31" width="78" height="40" rx="2.4"
        fill="none" stroke="#3f2f20" stroke-width="1.3" opacity="0.75"/>
</svg>
