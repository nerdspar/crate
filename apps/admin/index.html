<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crate — Admin</title>
</head>
<body>
<header>
  <div class="eyebrow">Crate</div>
  <h1>Admin</h1>
</header>

<main>
  <section id="search-section">
    <h2>Add albums</h2>
    <form id="search-form">
      <input id="q" type="search" placeholder="Search Apple Music — album or artist…" autocomplete="off" autofocus>
      <button type="submit">Search</button>
    </form>
    <div id="results" class="grid"></div>
  </section>

  <section id="shelf-section">
    <div class="section-head">
      <h2>On the shelf (<span id="shelf-count">0</span>)</h2>
      <div class="toolbar">
        <label>Sort
          <select id="shelf-sort">
            <option value="added">Recently added</option>
            <option value="artist">Artist</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
            <option value="custom">Custom order (drag)</option>
          </select>
        </label>
        <div class="viewtoggle">
          <button id="view-list" class="ghost">List</button>
          <button id="view-tile" class="ghost on">Tile</button>
        </div>
      </div>
    </div>
    <div id="shelf-list" class="grid"></div>
  </section>

  <section id="crates-section">
    <div class="section-head"><h2>Crates</h2></div>
    <p class="hint">Curated shelves the wall can switch between. "All" holds every album.</p>
    <div id="crates-list"></div>
    <form id="crate-form">
      <input id="crate-name" type="text" placeholder="New crate name…" autocomplete="off">
      <button type="submit">Create crate</button>
    </form>
  </section>

  <section id="settings-section">
    <div class="section-head"><h2>Settings</h2></div>
    <p class="hint">These are the same settings as the wall's on-screen Settings — change them from either place.</p>
    <div class="field">
      <label>Default speaker <span class="hint">(where albums play when none is picked)</span></label>
      <select id="default-speaker"><option value="">Loading…</option></select>
    </div>
    <div id="settings-form" class="settings-grid"></div>
  </section>
</main>

<div id="toast"></div>

<div id="editor" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-head">
      <h2 id="editor-title">Edit spine</h2>
      <button class="ghost" id="editor-close">Close</button>
    </div>
    <div class="field">
      <label>Custom cover image</label>
      <input type="file" id="ov-cover" accept="image/*">
    </div>
    <div class="field">
      <label>Custom spine image</label>
      <input type="file" id="ov-spine" accept="image/*">
    </div>
    <div class="field">
      <label>Spine mode</label>
      <select id="ov-spinemode">
        <option value="">Default (global)</option>
        <option value="art">Generated (art)</option>
        <option value="scan">Real scan</option>
        <option value="palette">Palette (plain)</option>
      </select>
    </div>
    <div class="field">
      <label>Label font</label>
      <select id="ov-font">
        <option value="">Default (generated)</option>
        <option value="'Archivo Narrow', sans-serif">Archivo Narrow</option>
        <option value="'Oswald', sans-serif">Oswald</option>
        <option value="'Newsreader Variable', serif">Newsreader</option>
      </select>
    </div>
    <div class="field">
      <label>Letter spacing</label>
      <input type="text" id="ov-tracking" placeholder="e.g. 0.08em (blank = default)">
    </div>
    <div class="field">
      <label>Label layout</label>
      <select id="ov-layout">
        <option value="">Default (global)</option>
        <option value="split">Split — artist top, title bottom</option>
        <option value="center">Centered</option>
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
      </select>
    </div>
    <div class="field">
      <label>Album year <span class="hint">(position is a global setting)</span></label>
      <select id="ov-year">
        <option value="">Default (global)</option>
        <option value="off">Off</option>
        <option value="vertical">Vertical</option>
        <option value="horizontal">Horizontal</option>
      </select>
    </div>
    <div class="field2">
      <div class="field">
        <label><input type="checkbox" id="ov-artist-on"> Artist color</label>
        <input type="color" id="ov-artist" value="#ece7dd">
      </div>
      <div class="field">
        <label><input type="checkbox" id="ov-title-on"> Title color</label>
        <input type="color" id="ov-title" value="#c83a3a">
      </div>
    </div>
    <button id="editor-save">Save spine</button>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
