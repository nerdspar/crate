<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Crate — Admin</title>
</head>
<body>
<main id="app">
  <!-- ============ ADD (My Library / Search × Albums / Playlists) ============ -->
  <section class="tab-pane on" data-tab="search">
    <header class="pane-head">
      <h1>Add</h1>
      <img class="pane-logo" alt="Crate" data-logo>
    </header>
    <div class="add-bar">
      <div class="seg" id="add-type">
        <button class="seg-btn on" data-type="album">Albums</button>
        <button class="seg-btn" data-type="playlist">Playlists</button>
        <button class="seg-btn" data-type="radio">Radio</button>
      </div>
      <select id="source-sel" class="source-sel" hidden></select>
    </div>
    <div class="lib-toolbar">
      <div class="search-wrap">
        <input id="add-search" type="search" placeholder="Search your library &amp; Apple Music…" autocomplete="off">
        <button id="add-clear" class="search-clear" type="button" aria-label="Clear search" hidden>×</button>
      </div>
      <button id="lib-import" class="ghost">Add all</button>
    </div>
    <div id="add-list"></div>
    <button id="add-more" class="ghost load-more" hidden>Load more</button>
  </section>

  <!-- ============ SHELVES ============ -->
  <section class="tab-pane" data-tab="shelves">
    <!-- Index: the list of shelves (All is just the default one) -->
    <div id="shelves-index">
      <header class="pane-head"><h1>Shelves</h1><img class="pane-logo" alt="Crate" data-logo></header>
      <div class="seg" id="shelves-type">
        <button class="seg-btn on" data-type="album">Albums</button>
        <button class="seg-btn" data-type="playlist">Playlists</button>
        <button class="seg-btn" data-type="radio">Radio</button>
      </div>
      <div id="shelves-list"></div>
      <form id="crate-form">
        <input id="crate-name" type="text" placeholder="New shelf name…" autocomplete="off">
        <button type="submit">Create</button>
      </form>
    </div>
    <!-- Detail: one shelf's albums, with its own sort + view -->
    <div id="shelf-detail" hidden>
      <header class="pane-head detail-head">
        <button id="shelf-back" class="ghost">‹ Shelves</button>
        <h1 id="shelf-detail-name">All albums</h1>
        <span id="shelf-detail-count" class="pane-sub"></span>
      </header>
      <div class="lib-toolbar">
        <input id="shelf-filter" type="search" placeholder="Filter this shelf…" autocomplete="off">
      </div>
      <div class="toolbar">
        <label class="sortlabel">Sort
          <select id="shelf-sort">
            <option value="custom">Custom order (drag)</option>
            <option value="added">Recently added</option>
            <option value="artist">Artist</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
          </select>
        </label>
        <div class="viewtoggle">
          <button id="view-list" class="ghost" aria-label="List view">List</button>
          <button id="view-tile" class="ghost on" aria-label="Tile view">Tile</button>
        </div>
      </div>
      <div id="shelf-list" class="grid"></div>
    </div>
    <!-- Songs of a single playlist (read-only) -->
    <div id="playlist-songs" hidden>
      <header class="pane-head detail-head">
        <button id="songs-back" class="ghost">‹ Playlists</button>
        <h1 id="songs-name">Playlist</h1>
        <span id="songs-count" class="pane-sub"></span>
      </header>
      <div id="songs-list"></div>
    </div>
  </section>

  <!-- ============ SETTINGS ============ -->
  <section class="tab-pane" data-tab="settings">
    <div id="settings-index">
      <header class="pane-head"><h1>Settings</h1><img class="pane-logo" alt="Crate" data-logo></header>
      <div id="settings-cats"></div>
    </div>
    <div id="settings-detail" hidden>
      <header class="pane-head detail-head">
        <button id="settings-back" class="ghost">‹ Settings</button>
        <h1 id="settings-cat-name">Category</h1>
      </header>
      <div id="settings-cat-body"></div>
    </div>
  </section>
</main>

<!-- ============ Bottom tab bar (iOS-style) ============ -->
<nav id="tabbar">
  <button class="tab-btn on" data-tab="search">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <span>Search</span>
  </button>
  <button class="tab-btn" data-tab="shelves">
    <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="4" height="16" rx="1"/><rect x="10" y="4" width="4" height="16" rx="1"/><rect x="16" y="6" width="5" height="14" rx="1" transform="rotate(-10 18.5 13)"/></svg>
    <span>Shelves</span>
  </button>
  <button class="tab-btn" data-tab="settings">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .32 1.77l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.6 1.6 0 0 0-1.77-.32 1.6 1.6 0 0 0-.97 1.47V21a2 2 0 0 1-4 0v-.11a1.6 1.6 0 0 0-1.05-1.47 1.6 1.6 0 0 0-1.77.32l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.6 1.6 0 0 0 4.6 15a1.6 1.6 0 0 0-1.47-.97H3a2 2 0 0 1 0-4h.11A1.6 1.6 0 0 0 4.6 9a1.6 1.6 0 0 0-.32-1.77l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.6 1.6 0 0 0 9 4.6a1.6 1.6 0 0 0 .97-1.47V3a2 2 0 0 1 4 0v.11A1.6 1.6 0 0 0 15 4.6a1.6 1.6 0 0 0 1.77-.32l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.6 1.6 0 0 0 19.4 9a1.6 1.6 0 0 0 1.47.97H21a2 2 0 0 1 0 4h-.11a1.6 1.6 0 0 0-1.49.97z"/></svg>
    <span>Settings</span>
  </button>
</nav>

<div id="toast"></div>

<div id="editor" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-head">
      <h2 id="editor-title">Edit spine</h2>
      <button class="ghost" id="editor-close">Close</button>
    </div>
    <div class="field">
      <label>Custom cover image</label>
      <input type="file" id="ov-cover" accept="image/*">
    </div>
    <div class="field">
      <label>Custom spine image</label>
      <input type="file" id="ov-spine" accept="image/*">
    </div>
    <div class="field">
      <label>Spine mode</label>
      <select id="ov-spinemode">
        <option value="">Default (global)</option>
        <option value="art">Generated (art)</option>
        <option value="scan">Real scan</option>
        <option value="palette">Palette (plain)</option>
      </select>
    </div>
    <div class="field">
      <label>Label font</label>
      <select id="ov-font">
        <option value="">Default (generated)</option>
        <option value="'Archivo Narrow', sans-serif">Archivo Narrow</option>
        <option value="'Oswald', sans-serif">Oswald</option>
        <option value="'Newsreader Variable', serif">Newsreader</option>
      </select>
    </div>
    <div class="field">
      <label>Letter spacing</label>
      <input type="text" id="ov-tracking" placeholder="e.g. 0.08em (blank = default)">
    </div>
    <div class="field">
      <label>Label layout</label>
      <select id="ov-layout">
        <option value="">Default (global)</option>
        <option value="split">Split — artist top, title bottom</option>
        <option value="center">Centered</option>
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
      </select>
    </div>
    <div class="field2">
      <div class="field">
        <label>Label size</label>
        <select id="ov-inksize">
          <option value="">Default (global)</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
      </div>
      <div class="field">
        <label>Label weight</label>
        <select id="ov-inkweight">
          <option value="">Default (global)</option>
          <option value="light">Light</option>
          <option value="regular">Regular</option>
          <option value="bold">Bold</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Album year <span class="hint">(position is a global setting)</span></label>
      <select id="ov-year">
        <option value="">Default (global)</option>
        <option value="off">Off</option>
        <option value="vertical">Vertical</option>
        <option value="horizontal">Horizontal</option>
      </select>
    </div>
    <div class="field2">
      <div class="field">
        <label><input type="checkbox" id="ov-artist-on"> Artist color</label>
        <input type="color" id="ov-artist" value="#ece7dd">
      </div>
      <div class="field">
        <label><input type="checkbox" id="ov-title-on"> Title color</label>
        <input type="color" id="ov-title" value="#c83a3a">
      </div>
    </div>
    <button id="editor-save">Save spine</button>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
