# Builds the Crate server image and publishes it to GitHub Container Registry
# (ghcr.io/nerdspar/crate) so TrueNAS (or any host) can pull it — no local Docker
# needed. Runs on pushes to main, on version tags, and on manual dispatch.
#
# TrueNAS SCALE is x86_64, so we build linux/amd64 only (fast). The Raspberry Pi
# appliance installs natively (not via this image), so arm64 isn't needed here;
# add it to `platforms` below if you ever want to run the container on a Pi.

name: docker-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }} # -> ghcr.io/nerdspar/crate

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # lets GITHUB_TOKEN push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
